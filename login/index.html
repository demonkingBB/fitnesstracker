<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EliteTrack</title>
  <link rel="stylesheet" href="../styles.css"> <!-- Inherits global landing aesthetic -->
  <link rel="stylesheet" href="login.css">    <!-- Custom login page layout -->
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="logo-link">EliteTrack</a>
        <h1>Welcome Back</h1>
        <p>Access your training workspace and metrics.</p>
      </div>

      <!-- Live Error Output Banner -->
      <div id="errorBanner" class="error-banner hidden"></div>

      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com" autocomplete="email">
        </div>
        
        <div class="input-group">
          <div class="label-wrapper">
            <label for="password">Password</label>
            <a href="#" id="forgotPasswordBtn" class="forgot-link">Forgot Password?</a>
          </div>
          <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
        </div>

        <button type="submit" id="submitBtn" class="btn-primary auth-submit">
          <span id="btnText">Log In</span>
          <div id="spinner" class="spinner hidden"></div>
        </button>
      </form>

      <div class="auth-footer">
        <p>New to EliteTrack? <a href="/signup/">Start Free Trial</a></p>
      </div>
    </div>
  </main>

  <script src="login.js" type="module"></script>
</body>
</html>
